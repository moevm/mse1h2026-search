engines:
  - name: meilisearch-default
    kind: meilisearch
    enabled: true
    timeout_seconds: 8
    retries: 1
    index_command: null
    params:
      host: http://localhost:7700
      api_key: masterKey
      index_name: site_content
      post_index_wait_seconds: 0

  - name: typesense-default
    kind: typesense
    enabled: true
    timeout_seconds: 120
    retries: 2
    index_command: null
    params:
      nodes:
        - host: localhost
          port: "8108"
          protocol: http
      api_key: xyz
      collection_name: site_content
      query_by: pagetitle,longtitle,description,introtext,content,embedding
      search_params:
        query_by_weights: "10,7,5,4,3,0"
        vector_query: "embedding:([], alpha: 0.55)"
        num_typos: 1
        min_len_1typo: 4
        min_len_2typo: 7
        prefix: "false"
        filter_by: "published:=1 && deleted:=0"
        sort_by: "_text_match:desc"
        prioritize_exact_match: "true"
        prioritize_token_position: "true"
        split_join_tokens: "fallback"
        drop_tokens_threshold: 0
        exclude_fields: "embedding"

  - name: apache_solr-default
    kind: apache_solr
    enabled: true
    timeout_seconds: 20
    retries: 1
    index_command: null

  - name: manticore-default
    kind: manticore
    enabled: true
    timeout_seconds: 20
    retries: 1
    index_command: null
