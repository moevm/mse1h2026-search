gzip on;
gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
gzip_min_length 1024;
gzip_vary on;

server {
  listen 80;
  server_name localhost;

  set $docs_enabled "${ENABLE_DOCS}";

  resolver 127.0.0.11 valid=30s;

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'self';" always;

  # Proxy headers
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # Static assets that Vite generates
  location ~* \.(js|css|svg|png|jpg|jpeg|gif|ico|woff|woff2|ttf|eot)$ {
    root /usr/share/nginx/html;
    expires 1y;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'self';" always;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # SPA — index.html must not be cached: it references hashed asset filenames.
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'self';" always;
    add_header Cache-Control "no-cache";
  }

  # API
  location /api/ {
    set $backend http://${BACKEND_HOST}:${BACKEND_PORT};
    proxy_pass $backend$request_uri;
  }

  # Swagger
  location /docs {
    if ($docs_enabled != "true") {
      return 404;
    }

    set $backend http://${BACKEND_HOST}:${BACKEND_PORT};
    proxy_pass $backend$request_uri;

    # Relaxed CSP for Swagger UI (loads assets from CDN)
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https://fastapi.tiangolo.com; frame-ancestors 'self';" always;
  }

  location /openapi.json {
    if ($docs_enabled != "true") {
      return 404;
    }

    set $backend http://${BACKEND_HOST}:${BACKEND_PORT};
    proxy_pass $backend$request_uri;
    # same relaxed headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https://fastapi.tiangolo.com; frame-ancestors 'self';" always;
  }
}
