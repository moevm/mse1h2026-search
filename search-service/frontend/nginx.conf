server {
    listen ${NGINX_PORT};
    server_name localhost;

    resolver 127.0.0.11 valid=30s;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://unpkg.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; frame-ancestors *;" always;

    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API 
    location /api/ {
        set $backend http://${BACKEND_HOST}:${BACKEND_PORT};
        proxy_pass $backend$request_uri;
    }

    # Swagger 
    location /docs {
        set $backend http://${BACKEND_HOST}:${BACKEND_PORT};
        proxy_pass $backend$request_uri;
    }

    location /openapi.json {
        set $backend http://${BACKEND_HOST}:${BACKEND_PORT};
        proxy_pass $backend$request_uri;
    }
}
