services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: search_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - search_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: search_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    ports:
      - "6767:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - search_network

networks:
  search_network:
    driver: bridge
